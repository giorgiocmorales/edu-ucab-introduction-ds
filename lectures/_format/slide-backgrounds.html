  function setBackground(slide, image) {
    if (!slide || !image) return;
    slide.setAttribute('data-background-image', image);
    slide.setAttribute('data-background-size', 'cover');
    slide.setAttribute('data-background-position', 'center');
  }

  function assignBackgrounds() {
    setBackground(document.getElementById('title-slide'), backgrounds.title);

    document.querySelectorAll('.slides section.slide.level1').forEach((slide) => {
      setBackground(slide, backgrounds.section);
    });

    document.querySelectorAll('.slides section.slide.level2').forEach((slide) => {
      const hasCode = slide.querySelector('.cell, pre.sourceCode, div.sourceCode');
      setBackground(slide, hasCode ? backgrounds.code : backgrounds.explanatory);
    });

    if (window.Reveal && typeof window.Reveal.sync === 'function') {
      window.Reveal.sync();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', assignBackgrounds, { once: true });
  } else {
    assignBackgrounds();
  }
})();
</script>
